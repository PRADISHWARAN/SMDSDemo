<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDMS — Smart Distributor Management System · Client Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15221D;
  --ink-soft:#4A5A52;
  --ink-faint:#7C8A83;
  --paper:#F3F5F3;
  --card:#FFFFFF;
  --line:#E2E7E3;
  --ledger:#0D3B2E;        /* deep ledger green (sidebar) */
  --ledger-2:#0A2F25;
  --leaf:#177B57;          /* action green */
  --leaf-soft:#E3F2EA;
  --marigold:#E8A020;      /* accent */
  --marigold-soft:#FCF0DA;
  --danger:#C6423A;
  --danger-soft:#FBE7E5;
  --info:#2D5FA8;
  --info-soft:#E5EDF9;
  --radius:14px;
  --shadow:0 1px 2px rgba(21,34,29,.05), 0 8px 24px -12px rgba(21,34,29,.12);
  --font-display:"Bricolage Grotesque", "Inter", system-ui, sans-serif;
  --font-body:"Inter", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--marigold-soft)}

/* ---------- Demo bar (pitch device) ---------- */
.demo-bar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--ink);color:#fff}
.demo-bar .tag{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--marigold);font-weight:700}
.demo-bar .hint{color:#B9C4BE;font-size:12px}
.role-pills{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.role-pill{border:1px solid rgba(255,255,255,.25);background:transparent;color:#DCE4DF;border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:600;transition:.15s}
.role-pill:hover{border-color:#fff;color:#fff}
.role-pill.active{background:var(--marigold);border-color:var(--marigold);color:#1E1503}

/* ---------- Layout ---------- */
.app{display:flex;min-height:calc(100vh - 44px)}
.sidebar{width:236px;flex-shrink:0;background:var(--ledger);color:#D7E4DD;display:flex;flex-direction:column;padding:20px 12px;position:sticky;top:44px;height:calc(100vh - 44px);overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:4px 10px 18px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:14px}
.brand .mark{width:34px;height:34px;border-radius:9px;background:var(--marigold);color:#1E1503;display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:15px}
.brand b{font-family:var(--font-display);font-size:17px;color:#fff;letter-spacing:.01em}
.brand small{display:block;font-size:10.5px;color:#8FA79C;letter-spacing:.08em;text-transform:uppercase}
.nav-label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#7E988C;padding:12px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;color:#C4D3CC;padding:9px 12px;border-radius:9px;font-size:13.5px;font-weight:500;transition:.12s}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(232,160,32,.16);color:#F6C15E;font-weight:600}
.nav-item .ico{width:18px;text-align:center;opacity:.9}
.nav-item .count{margin-left:auto;background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;border-radius:999px;padding:1px 7px}
.side-user{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding:14px 10px 4px;display:flex;gap:10px;align-items:center}
.avatar{width:34px;height:34px;border-radius:50%;background:#1E5A46;color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
.side-user b{color:#fff;font-size:13px;display:block}
.side-user small{color:#8FA79C;font-size:11px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:16px;padding:14px 26px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:44px;z-index:40}
.topbar h1{font-family:var(--font-display);font-size:19px;font-weight:700}
.crumb{font-size:12px;color:var(--ink-faint)}
.searchbox{margin-left:auto;position:relative;width:320px;max-width:38vw}
.searchbox input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:10px;background:var(--paper);font:inherit;font-size:13px}
.searchbox input:focus{outline:2px solid var(--leaf);outline-offset:-1px;background:#fff}
.searchbox .glass{position:absolute;left:11px;top:8px;color:var(--ink-faint)}
.search-drop{position:absolute;top:42px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;display:none;max-height:340px;overflow-y:auto;z-index:80}
.search-drop.open{display:block}
.sr-item{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--paper);font-size:13px}
.sr-item:hover{background:var(--paper)}
.sr-item .kind{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:6px;padding:2px 7px;flex-shrink:0}
.kind.product{background:var(--leaf-soft);color:var(--leaf)}
.kind.user{background:var(--info-soft);color:var(--info)}
.kind.invoice{background:var(--marigold-soft);color:#9A6708}
.kind.order{background:#EFE9FA;color:#6742B0}
.bell{position:relative;background:none;border:1px solid var(--line);border-radius:10px;width:38px;height:38px;font-size:16px}
.bell .dot{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:999px;padding:1px 6px}

.page{padding:26px;max-width:1180px;width:100%;margin:0 auto}

/* ---------- Cards / stats ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.stat .lbl{font-size:12px;color:var(--ink-faint);font-weight:600}
.stat .val{font-family:var(--font-display);font-size:26px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.stat .sub{font-size:11.5px;margin-top:4px;color:var(--ink-faint)}
.stat .sub.up{color:var(--leaf);font-weight:600}
.stat .sub.down{color:var(--danger);font-weight:600}
.stat.accent{border-top:3px solid var(--marigold)}
.stat.alert{border-top:3px solid var(--danger)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
.card-h{display:flex;align-items:center;gap:10px;padding:15px 20px;border-bottom:1px solid var(--line)}
.card-h h3{font-family:var(--font-display);font-size:15.5px;font-weight:700}
.card-h .right{margin-left:auto;display:flex;gap:8px}
.card-b{padding:18px 20px}
.card-b.flush{padding:0}

/* ---------- Flow strip (signature) ---------- */
.flow{display:flex;align-items:stretch;gap:0;padding:20px;overflow-x:auto}
.flow-node{flex:1;min-width:150px;background:linear-gradient(180deg,#fff, #F7FAF8);border:1px solid var(--line);border-radius:12px;padding:14px;position:relative}
.flow-node b{display:block;font-family:var(--font-display);font-size:14px}
.flow-node .role-t{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.flow-node .qty{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--ledger);margin-top:6px;font-variant-numeric:tabular-nums}
.flow-node small{color:var(--ink-faint);font-size:11px}
.flow-arrow{align-self:center;padding:0 10px;color:var(--marigold);font-size:20px;font-weight:800;flex-shrink:0;animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
@media (prefers-reduced-motion: reduce){.flow-arrow{animation:none}}

/* ---------- Tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);background:#FAFBFA}
td{padding:12px 16px;border-bottom:1px solid var(--paper);vertical-align:middle;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:0}
tr.rowh:hover td{background:#FAFBFA}
.num{text-align:right}
th.num{text-align:right}
.prod-cell{display:flex;align-items:center;gap:10px}
.prod-img{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;font-size:16px;background:var(--leaf-soft);flex-shrink:0}

/* ---------- Badges / buttons ---------- */
.badge{display:inline-block;font-size:11px;font-weight:700;border-radius:999px;padding:3px 10px}
.b-paid,.b-ok{background:var(--leaf-soft);color:var(--leaf)}
.b-pending{background:var(--marigold-soft);color:#9A6708}
.b-partial{background:var(--info-soft);color:var(--info)}
.b-danger{background:var(--danger-soft);color:var(--danger)}
.b-neutral{background:#EEF1EF;color:var(--ink-soft)}
.btn{border:0;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:600;transition:.12s}
.btn-primary{background:var(--leaf);color:#fff}
.btn-primary:hover{background:#116246}
.btn-gold{background:var(--marigold);color:#1E1503}
.btn-gold:hover{background:#D3901A}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink-soft)}
.btn-ghost:hover{border-color:var(--ink-faint)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{background:var(--danger-soft);color:var(--danger)}

/* ---------- Hierarchy tree ---------- */
.tree{padding:8px 0 4px}
.tnode{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);background:#fff;border-radius:10px;margin-bottom:8px}
.tnode .avatar{width:30px;height:30px;font-size:12px}
.tnode b{font-size:13px}
.tnode small{color:var(--ink-faint);font-size:11.5px;display:block}
.lv1{margin-left:0}.lv2{margin-left:34px}.lv3{margin-left:68px}.lv4{margin-left:102px}
.tnode .roleb{margin-left:auto}
.a-admin{background:#12281F;color:#F6C15E}
.a-dist{background:var(--info-soft);color:var(--info)}
.a-deal{background:var(--marigold-soft);color:#9A6708}
.a-ret{background:var(--leaf-soft);color:var(--leaf)}

/* ---------- Timeline (activity) ---------- */
.tl{list-style:none;position:relative;padding-left:22px}
.tl:before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl li{position:relative;padding:0 0 18px 12px}
.tl li:before{content:"";position:absolute;left:-21px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--leaf);border:2.5px solid #fff;box-shadow:0 0 0 2px var(--leaf-soft)}
.tl li.gold:before{background:var(--marigold);box-shadow:0 0 0 2px var(--marigold-soft)}
.tl li.red:before{background:var(--danger);box-shadow:0 0 0 2px var(--danger-soft)}
.tl .when{font-size:11px;color:var(--ink-faint);font-weight:600}
.tl .what{font-size:13.5px;margin-top:2px}

/* ---------- Notification rows ---------- */
.notif{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--paper)}
.notif:last-child{border-bottom:0}
.notif .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:16px;flex-shrink:0}
.notif b{font-size:13.5px}
.notif p{font-size:12.5px;color:var(--ink-soft)}
.notif time{margin-left:auto;font-size:11px;color:var(--ink-faint);flex-shrink:0}

/* ---------- Invoice ---------- */
.invoice{max-width:760px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:34px;box-shadow:var(--shadow)}
.inv-top{display:flex;justify-content:space-between;gap:20px;border-bottom:2px solid var(--ledger);padding-bottom:18px;margin-bottom:18px}
.inv-top h2{font-family:var(--font-display);font-size:24px;color:var(--ledger)}
.inv-no{font-family:var(--font-display);font-size:15px;font-weight:700}
.inv-meta{font-size:12.5px;color:var(--ink-soft);line-height:1.7}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:18px}
.inv-parties h4{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.inv-total-row td{font-weight:700;border-top:2px solid var(--line)}
.inv-grand td{font-family:var(--font-display);font-size:16px;font-weight:800;background:var(--leaf-soft);color:var(--ledger)}
.inv-foot{margin-top:20px;font-size:11.5px;color:var(--ink-faint);border-top:1px dashed var(--line);padding-top:12px;display:flex;justify-content:space-between}

/* ---------- Forms ---------- */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:13px;background:#fff}
.field input:focus,.field select:focus{outline:2px solid var(--leaf);outline-offset:-1px}

/* ---------- Misc ---------- */
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:start}
@media(max-width:960px){.two-col{grid-template-columns:1fr}}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:#EEF1EF;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--ink-soft)}
.bar-wrap{background:var(--paper);border-radius:999px;height:8px;overflow:hidden}
.bar{height:100%;border-radius:999px;background:var(--leaf)}
.bar.low{background:var(--danger)}
.bar.mid{background:var(--marigold)}
.muted{color:var(--ink-faint);font-size:12px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;box-shadow:0 12px 30px -8px rgba(0,0,0,.35);opacity:0;transform:translateY(10px);transition:.25s;z-index:100;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.section-note{background:var(--marigold-soft);border:1px solid #F1D9A8;border-radius:10px;padding:10px 14px;font-size:12.5px;color:#7A5406;margin-bottom:18px}
.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.report-tile{border:1px solid var(--line);border-radius:12px;padding:16px;background:#fff;transition:.12s}
.report-tile:hover{border-color:var(--leaf);box-shadow:var(--shadow)}
.report-tile .ic{font-size:22px}
.report-tile b{display:block;font-family:var(--font-display);font-size:14.5px;margin:8px 0 3px}
.report-tile p{font-size:12px;color:var(--ink-faint);margin-bottom:10px}
.spark{display:flex;align-items:flex-end;gap:4px;height:70px;padding-top:6px}
.spark i{flex:1;background:var(--leaf-soft);border-radius:4px 4px 0 0;position:relative}
.spark i.hot{background:var(--leaf)}
.spark-lbls{display:flex;gap:4px;margin-top:6px}
.spark-lbls span{flex:1;text-align:center;font-size:10px;color:var(--ink-faint)}
/* ---------- Mobile ---------- */
.hamburger{display:none;background:none;border:1px solid var(--line);border-radius:10px;width:38px;height:38px;font-size:17px;flex-shrink:0;align-items:center;justify-content:center}
.side-overlay{display:none;position:fixed;inset:0;background:rgba(13,25,20,.5);z-index:74;backdrop-filter:blur(1px)}
.side-overlay.show{display:block}
.side-close{display:none;margin-left:auto;background:none;border:0;color:#C4D3CC;font-size:20px;padding:4px 8px}
.card-b.flush{overflow-x:auto;-webkit-overflow-scrolling:touch}

@media(max-width:860px){
  .hamburger{display:flex}
  .side-close{display:block}
  .sidebar{position:fixed;left:0;top:0;height:100vh;height:100dvh;z-index:75;width:262px;transform:translateX(-105%);transition:transform .25s ease;box-shadow:8px 0 30px rgba(0,0,0,.25)}
  .sidebar.open{transform:none}
  @media (prefers-reduced-motion: reduce){.sidebar{transition:none}}

  .demo-bar{padding:8px 12px;gap:10px}
  .demo-bar .hint{display:none}
  .demo-bar .tag{font-size:10px;flex-shrink:0}
  .role-pills{margin-left:auto;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
  .role-pills::-webkit-scrollbar{display:none}
  .role-pill{flex-shrink:0;padding:6px 12px;font-size:12px}

  .topbar{padding:10px 14px;gap:10px;flex-wrap:wrap}
  .topbar h1{font-size:16px}
  .crumb{font-size:11px}
  .searchbox{order:10;flex-basis:100%;width:100%;max-width:none;margin-left:0}
  .searchbox input::placeholder{font-size:12px}
  .bell{margin-left:auto}

  .page{padding:14px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat{padding:12px 14px}
  .stat .val{font-size:20px}
  .stat .lbl{font-size:11px}
  .stat .sub{font-size:10.5px}

  .card{margin-bottom:14px}
  .card-h{padding:12px 14px;flex-wrap:wrap}
  .card-b{padding:14px}
  .card-b.flush table{min-width:660px}
  .card-h .right{flex-wrap:wrap}

  .flow{padding:14px;gap:0}
  .flow-node{min-width:132px;padding:11px}
  .flow-node .qty{font-size:19px}
  .flow-arrow{padding:0 6px;font-size:16px}

  .two-col{gap:14px}
  .lv2{margin-left:16px}.lv3{margin-left:32px}.lv4{margin-left:48px}
  .tnode{flex-wrap:wrap}
  .form-grid{grid-template-columns:1fr 1fr}

  .invoice{padding:18px 14px;overflow-x:auto}
  .invoice table{min-width:460px}
  .inv-top{flex-direction:column;gap:10px}
  .inv-top > div:last-child{text-align:left}
  .inv-parties{grid-template-columns:1fr;gap:12px}
  .inv-foot{flex-direction:column;gap:6px}

  .report-grid{grid-template-columns:1fr 1fr}
  .toast{left:14px;right:14px;bottom:14px;text-align:center}
  footer.demo-foot{padding:14px}
}
@media(max-width:420px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .report-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
footer.demo-foot{padding:18px 26px 30px;text-align:center;font-size:11.5px;color:var(--ink-faint)}
</style>
</head>
<body>

<!-- Demo control bar -->
<div class="demo-bar">
  <span class="tag">SDMS · Live Demo</span>
  <span class="hint">Switch roles to see what each user gets ➜</span>
  <div class="role-pills" id="rolePills"></div>
</div>

<div class="app">
  <div class="side-overlay" id="sideOverlay" onclick="toggleSide(false)"></div>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">S</div>
      <div><b>SDMS</b><small>Distributor Suite</small></div>
      <button class="side-close" onclick="toggleSide(false)" aria-label="Close menu">✕</button>
    </div>
    <div id="sideNav"></div>
    <div class="side-user" id="sideUser"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="hamburger" onclick="toggleSide(true)" aria-label="Open menu">☰</button>
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="crumb" id="crumb">Admin · Overview</div>
      </div>
      <div class="searchbox">
        <span class="glass">⌕</span>
        <input id="searchInput" type="text" placeholder="Search product, user, invoice, order…" autocomplete="off">
        <div class="search-drop" id="searchDrop"></div>
      </div>
      <button class="bell" onclick="go('notifications')">🔔<span class="dot" id="bellDot">3</span></button>
    </header>
    <div class="page" id="page"></div>
    <footer class="demo-foot">Smart Distributor Management System · Demo build with sample data · All figures shown are illustrative</footer>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* =============== SAMPLE DATA =============== */
const fmt = n => "₹" + n.toLocaleString("en-IN");

const PRODUCTS = [
 {name:"Agarbatti — Rose (Box of 12)", sku:"AGB-ROS-12", cat:"Agarbatti", img:"🕉️", cp:80, dp:100, dlp:120, rp:140, stock:800, min:100},
 {name:"Agarbatti — Sandal (Box of 12)", sku:"AGB-SND-12", cat:"Agarbatti", img:"🕉️", cp:90, dp:112, dlp:135, rp:158, stock:1240, min:100},

/* =============== NAV / ROUTER =============== */
function renderRolePills(){
 $("rolePills").innerHTML = Object.keys(ROLES).map(r=>
  `<button class="role-pill ${r===ROLE?'active':''}" onclick="setRole('${r}')">${ROLES[r].label}</button>`).join("");
}
function renderNav(){
 const cfg=ROLES[ROLE];
 $("sideNav").innerHTML = `<div class="nav-label">Menu</div>` + cfg.nav.map(n=>
  `<button class="nav-item ${n[0]===PAGE?'active':''}" onclick="go('${n[0]}')"><span class="ico">${n[1]}</span>${n[2]}${n[3]?`<span class="count">${n[3]}</span>`:""}</button>`).join("");
 $("sideUser").innerHTML = `<div class="avatar">${cfg.who[0]}</div><div><b>${cfg.who}</b><small>${cfg.sub} account</small></div>`;
}
function titleFor(p){const cfg=ROLES[ROLE];const f=cfg.nav.find(n=>n[0]===p);return f?f[2]:"Dashboard"}
function toggleSide(open){ $("sidebar").classList.toggle("open",open); $("sideOverlay").classList.toggle("show",open); }
function go(p){ if(!ROLES[ROLE].nav.some(n=>n[0]===p)) p="dashboard"; PAGE=p; render(); toggleSide(false); window.scrollTo({top:0}); }
function setRole(r){ ROLE=r; PAGE="dashboard"; render(); toggleSide(false); toast("Now viewing as "+ROLES[r].label); }
function render(){
 renderRolePills(); renderNav();
 $("pageTitle").textContent = titleFor(PAGE);
 $("crumb").textContent = ROLES[ROLE].label + " · " + titleFor(PAGE);
 $("bellDot").textContent = NOTIFS[ROLE].length;
 $("page").innerHTML = (PAGES[PAGE]||PAGES.dashboard)();
}

/* =============== GLOBAL SEARCH (Module 15) =============== */
const SEARCH_INDEX = [
 ...PRODUCTS.map(p=>({kind:"product",label:p.name,sub:p.sku+" · "+p.cat,page:"products"})),
 ...USERS.map(u=>({kind:"user",label:u.name,sub:u.role+" · "+u.city,page:"users"})),
 ...ORDERS.map(o=>({kind:"order",label:o.id,sub:o.from+" → "+o.to,page:"orders"})),
 ...PAYMENTS.map(p=>({kind:"invoice",label:p.inv,sub:p.party+" · "+p.status,page:"payments"})),
];
const si=$("searchInput"), sd=$("searchDrop");
si.addEventListener("input",()=>{
 const q=si.value.trim().toLowerCase();
 if(!q){sd.classList.remove("open");return}
 const hits=SEARCH_INDEX.filter(x=>(x.label+" "+x.sub).toLowerCase().includes(q)).slice(0,8);
 sd.innerHTML = hits.length? hits.map(h=>`<div class="sr-item" onclick="go('${h.page}');sd.classList.remove('open');si.value=''">
   <span class="kind ${h.kind}">${h.kind}</span><div><b>${h.label}</b><div class="muted">${h.sub}</div></div></div>`).join("")
  : `<div class="sr-item"><div class="muted">No results for “${si.value}”</div></div>`;
 sd.classList.add("open");
});
document.addEventListener("click",e=>{ if(!e.target.closest(".searchbox")) sd.classList.remove("open"); });

render();
</script>
